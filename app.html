<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadPulse — Recherche de leads</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#080810;--surface:#0f0f1c;--surface2:#141428;
  --border:rgba(255,255,255,.07);--border-accent:rgba(120,100,255,.4);
  --purple:#7c6cf5;--purple-light:#a99ff7;--green:#22c98a;--orange:#f09060;
  --text:#e8e6ff;--muted:rgba(255,255,255,.38);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:rgba(8,8,16,.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--purple);box-shadow:0 0 10px var(--purple)}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-link{font-size:12px;color:var(--muted);cursor:pointer;text-decoration:none;transition:color .15s}
.nav-link:hover{color:#fff}
.api-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);background:var(--surface);padding:5px 12px;border-radius:20px;border:1px solid var(--border)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}

/* HERO SEARCH */
.hero{padding:52px 32px 32px;text-align:center;max-width:680px;margin:0 auto;width:100%}
.hero-label{font-size:11px;font-weight:700;color:var(--purple-light);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
.hero-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:#fff;letter-spacing:-.03em;line-height:1.15;margin-bottom:8px}
.hero-title em{font-style:normal;background:linear-gradient(100deg,#c4b5fd,#9d8ffa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6}

/* SEARCH BOX */
.search-container{width:100%;max-width:580px;margin:0 auto}
.search-box{display:flex;gap:0;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:all .2s}
.search-box:focus-within{border-color:var(--border-accent);box-shadow:0 0 0 4px rgba(120,100,255,.1)}
.search-icon-wrap{display:flex;align-items:center;padding:0 16px;color:rgba(120,100,255,.5)}
.search-box input{flex:1;background:transparent;border:none;padding:15px 0;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
.search-box input::placeholder{color:rgba(255,255,255,.25)}
.btn-search{background:var(--purple);border:none;color:#fff;font-size:13px;font-weight:700;padding:0 24px;cursor:pointer;font-family:'Syne',sans-serif;display:flex;align-items:center;gap:7px;transition:all .15s;white-space:nowrap;margin:6px;border-radius:9px}
.btn-search:hover{background:#9488f7;box-shadow:0 4px 16px rgba(120,100,255,.4)}
.btn-search:disabled{opacity:.5;cursor:not-allowed}
.search-hint{font-size:11px;color:rgba(255,255,255,.2);margin-top:10px;text-align:center}
.search-hint span{color:rgba(120,100,255,.6)}

/* RESULTS */
.results-wrap{flex:1;padding:8px 32px 48px;max-width:780px;margin:0 auto;width:100%}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.results-count{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff}
.results-count span{color:var(--purple-light)}
.results-meta{font-size:11px;color:var(--muted);margin-top:2px}
.btn-csv{font-size:11px;padding:7px 16px;border-radius:8px;border:1px solid var(--border);color:var(--muted);background:transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-csv:hover{border-color:rgba(255,255,255,.25);color:#fff;background:rgba(255,255,255,.04)}

/* LEAD CARDS */
.leads-grid{display:flex;flex-direction:column;gap:8px}
.lead-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;transition:all .2s;cursor:default;display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start}
.lead-card:hover{border-color:rgba(120,100,255,.25);background:var(--surface2);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.lead-left{min-width:0}
.lead-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lead-address{font-size:11px;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.lead-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:10px;padding:3px 9px;border-radius:20px;display:flex;align-items:center;gap:4px;white-space:nowrap;font-weight:500}
.chip-siret{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4)}
.chip-naf{background:rgba(120,100,255,.08);border:1px solid rgba(120,100,255,.2);color:var(--purple-light)}
.chip-none{background:transparent;border:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.18);font-style:italic}
.lead-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.maps-btn{font-size:10px;color:rgba(120,100,255,.6);text-decoration:none;display:flex;align-items:center;gap:4px;transition:color .15s;white-space:nowrap}
.maps-btn:hover{color:var(--purple-light)}

/* STATES */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center;gap:12px}
.state-emoji{font-size:36px;margin-bottom:4px}
.state-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:#fff}
.state-sub{font-size:13px;color:var(--muted);max-width:300px;line-height:1.6}
.spinner{width:32px;height:32px;border:2.5px solid rgba(120,100,255,.2);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;color:#0a0a0f;font-size:12px;font-weight:600;padding:10px 20px;border-radius:20px;transition:transform .3s;z-index:999;box-shadow:0 8px 30px rgba(0,0,0,.4);white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav>
  <a class="logo" href="/landing.html">
    <div class="logo-dot"></div>
    LeadPulse
  </a>
  <div class="nav-right">
    <a class="nav-link" href="/landing.html">Accueil</a>
    <div class="api-badge">
      <div class="status-dot"></div>
      API connectée
    </div>
  </div>
</nav>

<div class="hero">
  <div class="hero-label">Moteur de prospection</div>
  <h1 class="hero-title">Trouvez vos prospects.<br><em>En quelques secondes.</em></h1>
  <p class="hero-sub">Tapez un secteur et une ville — on interroge la base officielle des entreprises françaises.</p>
  <div class="search-container">
    <div class="search-box">
      <div class="search-icon-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      </div>
      <input type="text" id="search-input" placeholder="Ex : coiffeur La Rochelle, avocat Bordeaux..." onkeydown="if(event.key==='Enter')doSearch()" autofocus>
      <button class="btn-search" id="search-btn" onclick="doSearch()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        Chercher
      </button>
    </div>
    <div class="search-hint">Essaie : <span>coiffeur La Rochelle</span> · <span>restaurant Bordeaux</span> · <span>avocat Paris</span></div>
  </div>
</div>

<div class="results-wrap" id="results-wrap"></div>

<div id="toast"></div>

<script>
let currentLeads = [];

async function doSearch(){
  const q = document.getElementById('search-input').value.trim();
  if(!q){ toast('Entre un secteur et une ville'); return; }
  setLoading(true);
  currentLeads = [];
  try {
    const res = await fetch('/api/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Erreur API');
    currentLeads = data.places || [];
    renderResults(currentLeads, q);
  } catch(e) {
    showError(e.message);
  }
  setLoading(false);
}

function renderResults(leads, query){
  const wrap = document.getElementById('results-wrap');
  if(!leads.length){
    wrap.innerHTML = '<div class="state-box"><div class="state-emoji">😶</div><div class="state-title">Aucun résultat</div><div class="state-sub">Essaie une autre ville ou un autre secteur.</div></div>';
    return;
  }
  let html = '<div class="results-header"><div><div class="results-count"><span>'+leads.length+'</span> leads trouvés pour "'+query+'"</div><div class="results-meta">Source : Registre officiel des entreprises françaises</div></div><button class="btn-csv" onclick="exportCSV()"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Exporter CSV</button></div><div class="leads-grid">';
  leads.forEach(function(l) {
    var siretChip = l.siret ? '<span class="chip chip-siret">🏢 '+l.siret+'</span>' : '';
    var nafChip = l.nafLabel ? '<span class="chip chip-naf">'+l.nafLabel+'</span>' : '';
    var mapsBtn = l.mapsUrl ? '<a class="maps-btn" href="'+l.mapsUrl+'" target="_blank"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>Maps</a>' : '';
    html += '<div class="lead-card"><div class="lead-left"><div class="lead-name">'+l.name+'</div><div class="lead-address"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'+l.address+'</div><div class="lead-chips">'+siretChip+nafChip+'</div></div><div class="lead-right">'+mapsBtn+'</div></div>';
  });
  html += '</div>';
  wrap.innerHTML = html;
}

function exportCSV(){
  if(!currentLeads.length){ toast('Aucun lead à exporter'); return; }
  const rows = [['Nom','Adresse','SIRET','Secteur']];
  currentLeads.forEach(function(l){ rows.push(['"'+l.name+'"','"'+l.address+'"',l.siret,'"'+l.nafLabel+'"']); });
  const csv = rows.map(function(r){return r.join(',');}).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='leads_leadpulse.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('✓ CSV exporté');
}

function setLoading(on){
  const btn = document.getElementById('search-btn');
  btn.disabled = on;
  btn.innerHTML = on ? '<div class="spinner" style="width:14px;height:14px;border-width:2px"></div>' : '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg> Chercher';
  if(on) document.getElementById('results-wrap').innerHTML = '<div class="state-box"><div class="spinner"></div><div class="state-title" style="margin-top:16px">Recherche en cours…</div><div class="state-sub">On interroge la base officielle des entreprises françaises.</div></div>';
}

function showError(msg){
  document.getElementById('results-wrap').innerHTML = '<div class="state-box"><div class="state-emoji">⚠️</div><div class="state-title">Erreur</div><div class="state-sub">'+msg+'</div></div>';
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');}, 2500);
}
</script>
</body>
</html>
