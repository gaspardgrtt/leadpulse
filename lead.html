<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiche Prospect — LeadPulse</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{
  --bg:#06060e;--s1:#0d0d1c;--s2:#111125;--s3:#161630;
  --b0:rgba(255,255,255,.06);--b1:rgba(255,255,255,.1);--b2:rgba(255,255,255,.18);
  --p:#7c6df8;--pl:rgba(124,109,248,.15);--pa:rgba(124,109,248,.35);
  --g:#00d48e;--gl:rgba(0,212,142,.12);--ga:rgba(0,212,142,.3);
  --o:#ffaa44;--ol:rgba(255,170,68,.12);--oa:rgba(255,170,68,.3);
  --r:#ff4757;--rl:rgba(255,71,87,.12);
  --b:#4fc3f7;--bl:rgba(79,195,247,.12);
  --y:#ffe066;
  --tx:#e2e0ff;--mu:rgba(228,226,255,.4);--fa:rgba(228,226,255,.14);
}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:80px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 10%,rgba(124,109,248,.06) 0%,transparent 55%),radial-gradient(ellipse 50% 40% at 85% 85%,rgba(0,212,142,.04) 0%,transparent 55%);pointer-events:none;z-index:0}

/* CURSOR */
#cur{position:fixed;width:9px;height:9px;background:var(--p);border-radius:50%;pointer-events:none;z-index:9999;top:-99px;left:-99px;box-shadow:0 0 12px rgba(124,109,248,.7);transition:transform .1s}
#cur.c{transform:scale(.6)}
#cur.h{width:20px;height:20px;background:transparent;border:1.5px solid var(--p)}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--b0);background:rgba(6,6,14,.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:200}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#fff;display:flex;align-items:center;gap:8px;text-decoration:none}
.logomark{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,#7c6df8,#b3a9ff);display:flex;align-items:center;justify-content:center}
.logomark svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.5}
.btn-back{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mu);background:var(--s1);border:1px solid var(--b0);padding:7px 14px;border-radius:8px;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn-back:hover{color:#fff;border-color:var(--b1)}

/* ENRICH BANNER */
.enrich-banner{margin:24px 24px 0;padding:14px 18px;background:linear-gradient(135deg,rgba(124,109,248,.1),rgba(0,212,142,.07));border:1px solid rgba(124,109,248,.25);border-radius:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:relative;z-index:1}
.eb-left{display:flex;align-items:center;gap:12px}
.eb-pulse{width:8px;height:8px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
.eb-text{}
.eb-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.eb-sub{font-size:11px;color:var(--mu)}
.btn-enrich{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:9px 20px;border-radius:9px;background:var(--p);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap}
.btn-enrich:hover{background:#9080ff;box-shadow:0 6px 20px rgba(124,109,248,.4)}
.btn-enrich:disabled{opacity:.45;cursor:not-allowed}

/* WRAP */
.wrap{max-width:1120px;margin:0 auto;padding:24px 24px;position:relative;z-index:1}

/* HERO */
.hero{background:var(--s1);border:1px solid var(--b0);border-radius:18px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(124,109,248,.5),transparent)}
.hero-grid{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start}
@media(max-width:700px){.hero-grid{grid-template-columns:1fr}.hero-right{flex-direction:row!important;justify-content:space-between!important;flex-wrap:wrap}}
.hero-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--p);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.hero-name{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;letter-spacing:-.03em;line-height:1.1;margin-bottom:8px}
.hero-addr{font-size:13px;color:var(--mu);display:flex;align-items:center;gap:6px;margin-bottom:14px}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.chip{font-size:11px;padding:4px 11px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;font-weight:500;border:1px solid transparent}
.c-naf{background:var(--pl);border-color:var(--pa);color:#b3a9ff}
.c-sz{background:var(--bl);border-color:rgba(79,195,247,.25);color:var(--b)}
.c-web{background:var(--ol);border-color:var(--oa);color:var(--o)}
.c-noweb{background:var(--rl);border-color:rgba(255,71,87,.2);color:var(--r)}
.c-good{background:var(--gl);border-color:var(--ga);color:var(--g)}
.c-hot{background:rgba(255,71,87,.12);border-color:rgba(255,71,87,.35);color:#ff6b77}
.c-warm{background:rgba(255,170,68,.12);border-color:rgba(255,170,68,.35);color:var(--o)}

/* CONTACTS BAR */
.contacts-bar{display:flex;gap:8px;flex-wrap:wrap}
.clink{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.75);background:rgba(255,255,255,.04);border:1px solid var(--b0);padding:6px 11px;border-radius:8px;text-decoration:none;transition:all .15s;cursor:pointer}
.clink:hover{background:rgba(255,255,255,.08);color:#fff;border-color:var(--b1)}
.clink.missing{color:var(--mu);border-style:dashed;opacity:.6}
.clink svg{flex-shrink:0;width:12px;height:12px}

/* HERO RIGHT */
.hero-right{display:flex;flex-direction:column;align-items:flex-end;gap:14px;flex-shrink:0}
.score-ring{position:relative;width:88px;height:88px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.score-n{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;line-height:1}
.score-l{font-size:9px;color:var(--mu);margin-top:1px}
.google-badge{display:flex;flex-direction:column;align-items:flex-end;gap:3px;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid var(--b0);border-radius:10px}
.stars{display:flex;gap:2px}
.star{font-size:13px;color:#ffe066;line-height:1}
.star.half{color:rgba(255,224,102,.4)}
.star.empty{color:var(--fa)}
.gbadge-r{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff}
.gbadge-n{font-size:10px;color:var(--mu)}
.gbadge-source{font-size:9px;color:var(--mu);margin-top:2px;text-align:right}

/* 2-COL GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:780px){.grid2{grid-template-columns:1fr}}
.full{grid-column:1/-1}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--b0);border-radius:16px;overflow:hidden}
.card-head{padding:14px 18px;border-bottom:1px solid var(--b0);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px}
.card-body{padding:18px}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.info-box{background:rgba(255,255,255,.02);border:1px solid var(--b0);border-radius:10px;padding:11px 13px}
.info-lbl{font-size:10px;color:var(--mu);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.info-val{font-size:13px;color:#fff;font-weight:500;display:flex;align-items:center;gap:6px;word-break:break-all}
.info-val a{color:#b3a9ff;text-decoration:none;font-size:12px}
.info-val a:hover{color:#fff}
.info-val.na{color:var(--mu);font-weight:400;font-style:italic;font-size:12px}
.copy-btn{background:none;border:none;color:var(--mu);cursor:pointer;padding:2px;transition:color .15s;flex-shrink:0;display:flex}
.copy-btn:hover{color:#b3a9ff}

/* SOCIAL ROW */
.social-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.social-card{background:rgba(255,255,255,.02);border:1px solid var(--b0);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px;transition:all .15s;text-decoration:none}
.social-card:hover{background:rgba(255,255,255,.05);border-color:var(--b1)}
.social-card.found{border-color:rgba(0,212,142,.2);background:var(--gl)}
.social-card.missing{border-style:dashed;opacity:.55}
.soc-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.soc-info{}
.soc-name{font-size:11px;font-weight:600;color:#fff;margin-bottom:1px}
.soc-val{font-size:11px;color:var(--mu)}
.soc-val.ok{color:var(--g);font-weight:500}

/* SCORE BREAKDOWN */
.score-rows{display:flex;flex-direction:column;gap:6px}
.srow{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;background:rgba(255,255,255,.02);border:1px solid var(--b0)}
.srow-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px}
.srow-icon.ok{background:var(--gl);color:var(--g)}
.srow-icon.bad{background:var(--rl);color:var(--r)}
.srow-icon.warn{background:var(--ol);color:var(--o)}
.srow-text{flex:1;font-size:12px;color:rgba(255,255,255,.75)}
.srow-hint{font-size:10px;color:var(--mu);margin-top:1px}
.srow-pts{font-size:11px;font-weight:700;color:var(--mu);flex-shrink:0}

/* OPPORTUNITY BADGE */
.opp-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px;background:rgba(255,71,87,.15);border:1px solid rgba(255,71,87,.3);color:#ff6b77;margin-top:12px}

/* ACTION BUTTONS */
.btn-ai{font-size:12px;padding:7px 13px;border-radius:8px;border:1px solid;cursor:pointer;font-weight:700;font-family:'DM Sans',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-purple{background:var(--p);border-color:var(--p);color:#fff}
.btn-purple:hover{background:#9080ff;box-shadow:0 4px 16px rgba(124,109,248,.4)}
.btn-purple:disabled{opacity:.45;cursor:not-allowed}
.btn-green{background:var(--gl);border-color:var(--ga);color:var(--g)}
.btn-green:hover{background:rgba(0,212,142,.2);color:#fff}
.btn-ghost{background:transparent;border-color:var(--b0);color:var(--mu)}
.btn-ghost:hover{border-color:var(--b1);color:#fff}

/* MSG BOX */
.msg-box{font-size:13px;color:rgba(255,255,255,.88);line-height:1.85;white-space:pre-wrap;background:rgba(0,0,0,.2);border:1px solid var(--b0);border-radius:10px;padding:16px;min-height:80px;margin-bottom:12px}
.ai-loading{display:flex;align-items:center;gap:8px;color:var(--mu);font-size:12px;padding:14px 0}
.dots{display:flex;gap:4px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--p);animation:dp 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

/* COLD CALL */
.prog-bar{display:flex;gap:4px;align-items:center;margin-bottom:14px}
.prog-seg{flex:1;height:3px;border-radius:3px;background:var(--fa);transition:background .3s}
.prog-seg.done{background:var(--g)}
.prog-seg.active{background:var(--p)}
.prog-lbl{font-size:10px;color:var(--mu);margin-left:8px;white-space:nowrap}
.step-card{border:1px solid var(--b0);border-radius:12px;margin-bottom:8px;overflow:hidden;transition:all .2s}
.step-card.active{border-color:rgba(124,109,248,.4);box-shadow:0 4px 20px rgba(124,109,248,.1)}
.step-card.done{border-color:rgba(0,212,142,.25);opacity:.7}
.step-head{padding:11px 15px;display:flex;align-items:center;gap:9px;cursor:pointer}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:800;flex-shrink:0;transition:all .3s}
.step-num.pend{background:rgba(255,255,255,.06);color:var(--mu)}
.step-num.actv{background:var(--p);color:#fff;box-shadow:0 0 12px rgba(124,109,248,.5)}
.step-num.dn{background:var(--gl);color:var(--g);border:1px solid var(--ga)}
.step-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;flex:1;color:#fff}
.step-dur{font-size:10px;color:var(--mu)}
.step-body{padding:0 15px 13px;display:none}
.step-body.open{display:block}
.step-script{font-size:13px;color:rgba(255,255,255,.9);line-height:1.8;background:rgba(0,0,0,.18);border:1px solid var(--b0);border-radius:8px;padding:13px;margin-bottom:9px;font-style:italic}
.step-tip{font-size:11px;color:var(--o);background:var(--ol);border:1px solid var(--oa);border-radius:7px;padding:8px 11px;margin-bottom:10px;line-height:1.5}
.step-nav{display:flex;gap:7px}
.btn-done{font-size:11px;padding:6px 13px;border-radius:7px;background:var(--gl);border:1px solid var(--ga);color:var(--g);cursor:pointer;font-weight:700;transition:all .15s}
.btn-done:hover{background:rgba(0,212,142,.2);color:#fff}
.btn-skip{font-size:11px;padding:6px 13px;border-radius:7px;background:transparent;border:1px solid var(--b0);color:var(--mu);cursor:pointer;transition:all .15s}
.btn-skip:hover{border-color:var(--b1);color:#fff}
.branches{display:flex;flex-direction:column;gap:7px;margin-top:6px}
.branch-lbl{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.branch-item{border:1px solid var(--b0);border-radius:9px;overflow:hidden}
.branch-trigger{padding:9px 13px;display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;font-weight:600;color:rgba(255,255,255,.7);background:rgba(255,255,255,.02);transition:background .15s}
.branch-trigger:hover,.branch-trigger.open{background:var(--pl);color:#fff}
.branch-resp{padding:11px 13px;font-size:12px;color:rgba(255,255,255,.8);line-height:1.75;background:rgba(124,109,248,.04);border-top:1px solid var(--b0);display:none;font-style:italic}
.branch-resp.open{display:block}

/* SITE ANALYSIS */
.url-row{display:flex;gap:8px;margin-bottom:10px}
.url-row input{flex:1;background:var(--s2);border:1px solid var(--b0);border-radius:8px;padding:9px 12px;color:#fff;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.url-row input:focus{border-color:var(--pa)}
.url-row input::placeholder{color:var(--mu)}

/* ENRICH MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--s1);border:1px solid var(--b1);border-radius:20px;width:100%;max-width:500px;overflow:hidden;animation:mfade .25s ease}
@keyframes mfade{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-head{padding:20px 22px 16px;border-bottom:1px solid var(--b0);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:#fff}
.modal-close{background:none;border:none;color:var(--mu);cursor:pointer;font-size:18px;transition:color .15s}
.modal-close:hover{color:#fff}
.modal-body{padding:20px 22px}
.pipeline-steps{display:flex;flex-direction:column;gap:0}
.pipe-step{display:flex;gap:12px;position:relative;padding-bottom:18px}
.pipe-step:last-child{padding-bottom:0}
.pipe-step:not(:last-child)::after{content:'';position:absolute;left:15px;top:32px;bottom:0;width:1px;background:var(--b0)}
.pipe-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;position:relative;z-index:1}
.pipe-icon.pend{background:var(--s2);border:1px solid var(--b0)}
.pipe-icon.running{background:var(--pl);border:1px solid var(--pa);animation:glow 1s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(124,109,248,0)}50%{box-shadow:0 0 12px rgba(124,109,248,.5)}}
.pipe-icon.done{background:var(--gl);border:1px solid var(--ga)}
.pipe-icon.error{background:var(--rl);border:1px solid rgba(255,71,87,.3)}
.pipe-info{}
.pipe-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.pipe-desc{font-size:11px;color:var(--mu);line-height:1.5}
.pipe-result{font-size:11px;font-weight:600;margin-top:4px}
.pipe-result.found{color:var(--g)}
.pipe-result.missing{color:var(--mu)}
.pipe-result.error{color:var(--o)}
.modal-footer{padding:14px 22px;border-top:1px solid var(--b0);display:flex;justify-content:flex-end;gap:8px}

/* SPINNER */
.spin{width:14px;height:14px;border:2px solid rgba(124,109,248,.2);border-top-color:var(--p);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#1c1c32;color:#fff;font-size:12px;font-weight:600;padding:9px 18px;border-radius:20px;transition:all .22s;z-index:600;box-shadow:0 4px 24px rgba(0,0,0,.6);white-space:nowrap;opacity:0;border:1px solid var(--pa);pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* CALL READY */
.call-ready{background:linear-gradient(135deg,rgba(0,212,142,.07),rgba(124,109,248,.07));border:1px solid rgba(0,212,142,.2);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.cr-icon{font-size:22px;flex-shrink:0}
.cr-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.cr-sub{font-size:11px;color:var(--mu);line-height:1.5}

/* ANALYSIS */
.analysis-sep{margin-top:14px;padding-top:14px;border-top:1px solid var(--b0)}
</style>
</head>
<body>
<div id="cur"></div>
<div id="toast"></div>

<!-- ENRICH MODAL -->
<div class="modal-overlay" id="enrich-modal" style="display:none" onclick="if(event.target===this&&!enrichRunning)closeModal()">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">🔍 Enrichissement automatique</div>
      <button class="modal-close" onclick="if(!enrichRunning)closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="pipeline-steps" class="pipeline-steps"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ai btn-ghost" id="modal-cancel-btn" onclick="closeModal()">Annuler</button>
      <button class="btn-ai btn-purple" id="modal-done-btn" onclick="closeModal()" style="display:none">✓ Terminé</button>
    </div>
  </div>
</div>

<nav>
  <a class="logo" href="#">
    <div class="logomark"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    LeadPulse
  </a>
  <button class="btn-back" onclick="history.back()">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Retour aux leads
  </button>
</nav>

<div class="enrich-banner" id="enrich-banner">
  <div class="eb-left">
    <div class="eb-pulse"></div>
    <div class="eb-text">
      <div class="eb-title">Fiche incomplète — enrichissement disponible</div>
      <div class="eb-sub" id="enrich-banner-sub">Téléphone, réseaux sociaux et note Google manquants → Score sous-estimé</div>
    </div>
  </div>

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function nl2br(s){ return (s||'').replace(/\n/g,'<br>') }

function scoreColor(s){return s>=7?'var(--g)':s>=4?'var(--o)':'var(--r)'}

// ── SCORE CALCULATION ─────────────────────────────────────────────────────────
function calcScore(l) {
  let s = 0;
  const ph = l.phoneEnriched || l.phone;
  const ws = l.websiteEnriched || l.website;
  const em = l.email;
  if (ws) s += 3;
  if (ph) s += 2;
  if (em && !em.startsWith('contact@')) s += 2;
  else if (em) s += 1;
  if (l.effectif && l.effectif !== '0 salarié') s += 1;
  if (l.anneeCreation && (new Date().getFullYear() - parseInt(l.anneeCreation)) >= 3) s += 1;
  if (l.mapsUrl) s += 0.5;
  if (l.googleRating) s += 1;
  if (l.instagram || l.facebook) s += 1;
  return Math.min(Math.round(s * 10) / 10, 10);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderPage(l) {

  // Google stars
  function starsHtml(r) {
    if (!r) return '';
    const full = Math.floor(r);
    const half = (r - full) >= 0.3 ? 1 : 0;
    const empty = 5 - full - half;
    return '<div class="stars">'
      + '★'.repeat(full).split('').map(()=>`<span class="star">★</span>`).join('')

  // Chips

    const cls = isMissing ? 'clink missing' : 'clink';

    const tag = href && !isMissing ? 'a' : 'span';
    const cp = copyVal ? `<button class="copy-btn" onclick="copyText('${esc(copyVal)}','${esc(text)}')" title="Copier">

    return `<${tag} class="${cls}" ${target}>${icon} <span>${isMissing ? text + ' manquant' : esc(text)}</span>${cp}</${tag}>`;

  const contactLinks = `

    </div>`;

  // Score items
  function srow(lbl, hint, ok, pts) {

  const html = `

              stroke-dasharray="${circC.toFixed(1)}" stroke-dashoffset="${dash.toFixed(1)}" stroke-linecap="round"/>
          </svg>
          <div class="score-inner"><div class="score-n">${sc}</div><div class="score-l">/10</div></div>
        </div>

          ${starsHtml(l.googleRating)}
          <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
            <div class="gbadge-r">${l.googleRating.toFixed(1)}</div>
            <div class="gbadge-n">${l.googleReviews || 0} avis</div>
          </div>
          <div class="gbadge-source">📍 Google Maps</div>
        </div>` : `
        <div class="google-badge" style="opacity:.45">
          <div style="font-size:10px;color:var(--mu);text-align:right">Note Google<br>non récupérée</div>
          <button class="btn-ai btn-ghost" style="font-size:10px;padding:4px 9px;margin-top:5px" onclick="openEnrichModal()">+ Enrichir</button>
        </div>`}
      </div>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="grid2">

    <!-- COL 1 -->
    <div style="display:flex;flex-direction:column;gap:20px">

      <!-- INFOS -->
      <div class="card">
        <div class="card-head">
          <div class="card-title">📋 Informations légales</div>

        </div>
        <div class="card-body">
          <div class="info-grid">
            ${infoBox('Téléphone', ph ? `<a href="tel:${esc(ph)}">${esc(ph)}</a>` : null, ph, '📞')}
            ${infoBox('Email', l.email ? `<a href="mailto:${esc(l.email)}">${esc(l.email)}</a>` : null, l.email, '✉')}
            ${infoBox('Site web', ws ? `<a href="${ws.startsWith('http')?ws:'https://'+ws}" target="_blank">${esc(ws.replace(/^https?:\/\/(www\.)?/,'').slice(0,26))}</a>` : null, ws, '🌐')}
            ${infoBox('Effectifs', l.effectif ? esc(l.effectif)+' sal.' : null, null, '👥')}
            ${infoBox('Fondée en', l.anneeCreation ? esc(l.anneeCreation)+` (${yearAge} ans)` : null, null, '📅')}
            ${infoBox('SIRET', l.siret ? esc(l.siret) : null, l.siret, '🏢')}
            ${infoBox('Code NAF', l.nafCode ? esc(l.nafCode) : null, null, '📌')}

          </div>
          <div class="analysis-sep">

            <div class="url-row">

            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>

          </div>
          ${(!l.instagram && !l.facebook && !l.tiktok) ? `
          <div style="margin-top:12px;padding:12px;background:var(--rl);border:1px solid rgba(255,71,87,.2);border-radius:9px;font-size:12px;color:rgba(255,255,255,.75);line-height:1.6">
            <strong style="color:var(--r)">⚠ Absent des réseaux</strong> — Ce prospect n'a aucune présence sociale détectée. C'est un signal fort : il a besoin d'aide pour sa visibilité. <strong>Lead chaud pour une offre réseaux sociaux ou site vitrine.</strong>
          </div>` : ''}
        </div>

      <!-- EMAIL IA -->
      <div class="card">
        <div class="card-head">

          <button class="btn-ai btn-purple" id="btn-gen-email" onclick="generateEmail()" style="font-size:11px;padding:6px 12px">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            Générer

        </div>
        <div class="card-body" id="email-zone">

    </div>

    <!-- COL 2 -->
    <div style="display:flex;flex-direction:column;gap:20px">

      <!-- SCORE -->
      <div class="card">
        <div class="card-head">

          <div style="font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:${barColor}">${sc}/10</div>
        </div>
        <div class="card-body">
          <div style="font-size:12px;padding:9px 13px;border-radius:9px;margin-bottom:13px;border:1px solid;
            background:${sc<=3?'var(--rl)':sc<=6?'var(--ol)':'var(--gl)'};
            border-color:${sc<=3?'rgba(255,71,87,.2)':sc<=6?'var(--oa)':'var(--ga)'};
            color:${barColor}">
            ${sc<=3?'🔴 Score très faible — prospect idéal, contacter maintenant':sc<=6?'🟡 Présence partielle — plusieurs angles d\'attaque':'🟢 Présence correcte — argumentaire centré sur la performance'}
          </div>
          <div class="score-rows">
            ${srow('Site web', ws||'Aucun site — opportunité clé', !!ws, 3)}
            ${srow('Téléphone', ph||'Non disponible dans la base', !!ph, 2)}
            ${srow('Email professionnel', hasEmail ? l.email : hasEmailGuess ? 'Email deviné (contact@…)' : 'Non disponible', hasEmail ? true : hasEmailGuess ? 'warn' : false, 2)}
            ${srow('Note Google', l.googleRating ? l.googleRating+'/5 ('+l.googleReviews+' avis)' : 'Non récupérée', !!l.googleRating, 1)}
            ${srow('Réseaux sociaux', (l.instagram||l.facebook||l.tiktok) ? 'Présence détectée' : 'Absent des réseaux', !!(l.instagram||l.facebook||l.tiktok), 1)}
            ${srow('Entreprise établie', yearAge>=3 ? `Fondée en ${l.anneeCreation} (${yearAge} ans)` : 'Trop récente', yearAge>=3, 1)}
          </div>
          ${opps.length >= 2 ? `<div class="opp-badge" style="margin-top:12px;display:flex">🎯 ${opps.length} lacunes = pitch facile</div>` : ''}
        </div>
      </div>

      <!-- COLD CALL -->
      <div class="card">
        <div class="card-head">

          <button class="btn-ai btn-purple" id="btn-gen-call" onclick="generateCall()" style="font-size:11px;padding:6px 12px">
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            Générer
          </button>

        <div class="card-body" id="call-zone">

  </div>`;

  document.getElementById('main-wrap').innerHTML = html;
  updateBanner(l);

}

// ── UPDATE BANNER ─────────────────────────────────────────────────────────────
function updateBanner(l) {
  const ph = l.phoneEnriched || l.phone;
  const ws = l.websiteEnriched || l.website;
  const missing = [];
  if (!ph) missing.push('téléphone');
  if (!ws) missing.push('site web');
  if (!l.instagram && !l.facebook) missing.push('réseaux sociaux');
  if (!l.googleRating) missing.push('note Google');

  const banner = document.getElementById('enrich-banner');
  const sub = document.getElementById('enrich-banner-sub');
  if (missing.length === 0) {
    banner.style.background = 'linear-gradient(135deg,rgba(0,212,142,.1),rgba(0,212,142,.05))';
    banner.style.borderColor = 'rgba(0,212,142,.3)';
    document.querySelector('.eb-pulse').style.background = 'var(--g)';
    document.getElementById('btn-main-enrich').style.display = 'none';
    document.querySelector('.eb-title').textContent = '✓ Fiche enrichie — toutes les données présentes';
    sub.textContent = 'Score recalculé avec les données enrichies';
  } else {
    sub.textContent = missing.join(', ')+' manquant'+(missing.length>1?'s':'')+' → Score sous-estimé';
  }
}

// ── ENRICH MODAL ──────────────────────────────────────────────────────────────
let enrichRunning = false;

const PIPELINE = [
  {id:'google', icon:'📍', name:'Google Maps Scraping', desc:'Récupération note, avis, téléphone, site web via Places API', source:'Outscraper / Google Places'},
  {id:'pagesjaunes', icon:'📒', name:'PagesJaunes', desc:'Recherche du numéro de téléphone par nom + adresse', source:'PagesJaunes scraper'},
  {id:'social', icon:'🔍', name:'Détection réseaux sociaux', desc:'Recherche Instagram, Facebook, TikTok par nom d'enseigne', source:'Search API + parsing'},
  {id:'score', icon:'📊', name:'Recalcul du score', desc:'Mise à jour du score de présence digitale avec les nouvelles données', source:'LeadPulse engine'},
];

function openEnrichModal() {
  const modal = document.getElementById('enrich-modal');
  const stepsEl = document.getElementById('pipeline-steps');
  stepsEl.innerHTML = PIPELINE.map((p,i) => `
    <div class="pipe-step" id="pipe-${p.id}">
      <div class="pipe-icon pend" id="pipe-icon-${p.id}">${p.icon}</div>
      <div class="pipe-info">
        <div class="pipe-name">${p.name}</div>
        <div class="pipe-desc">${p.desc} <span style="color:var(--mu);font-size:10px">· ${p.source}</span></div>
        <div class="pipe-result" id="pipe-res-${p.id}"></div>
      </div>
    </div>
  `).join('');
  document.getElementById('modal-cancel-btn').style.display = '';
  document.getElementById('modal-done-btn').style.display = 'none';
  modal.style.display = 'flex';
  runEnrichment();
}

function closeModal() {
  document.getElementById('enrich-modal').style.display = 'none';
}

async function runEnrichment() {
  enrichRunning = true;
  document.getElementById('btn-main-enrich').disabled = true;
  document.getElementById('modal-cancel-btn').style.display = 'none';

  async function stepRun(id, fn) {
    document.getElementById('pipe-icon-'+id).className = 'pipe-icon running';
    await new Promise(r => setTimeout(r, 1200 + Math.random()*800));
    try {
      const result = await fn();
      document.getElementById('pipe-icon-'+id).className = 'pipe-icon done';
      document.getElementById('pipe-icon-'+id).textContent = '✓';
      const resEl = document.getElementById('pipe-res-'+id);
      if (resEl) { resEl.className = 'pipe-result found'; resEl.textContent = result; }
    } catch(e) {
      document.getElementById('pipe-icon-'+id).className = 'pipe-icon error';
      document.getElementById('pipe-icon-'+id).textContent = '!';
      const resEl = document.getElementById('pipe-res-'+id);
      if (resEl) { resEl.className = 'pipe-result error'; resEl.textContent = e.message; }
    }
  }

  // Step 1: Google (simulate found data)
  await stepRun('google', async () => {
    lead.googleRating = 4.6;
    lead.googleReviews = 47;
    lead.phoneEnriched = '+33 6 12 34 56 78';
    lead.websiteEnriched = null;
    return '✓ Note: 4.6★ · 47 avis · Tél: +33 6 12 34 56 78';
  });

  // Step 2: PagesJaunes (no new phone found since Google had one)
  await stepRun('pagesjaunes', async () => {
    return '✓ Confirmation téléphone · Pas d\'email supplémentaire';
  });

  // Step 3: Social
  await stepRun('social', async () => {
    lead.instagram = '@exphair_barber';
    lead.facebook = 'EXP\'HAIR BARBER Paris';
    lead.tiktok = null;
    return '✓ Instagram @exphair_barber · Facebook trouvé';
  });

  // Step 4: Score recalc
  await stepRun('score', async () => {
    lead.enriched = true;
    const newScore = calcScore(lead);
    return `Score mis à jour : ${newScore}/10 (était ${lead.presenceScore}/10)`;
  });

  enrichRunning = false;
  document.getElementById('modal-cancel-btn').style.display = 'none';
  document.getElementById('modal-done-btn').style.display = '';

  // Re-render on close
  document.getElementById('modal-done-btn').onclick = () => {
    closeModal();
    localStorage.setItem('lp_current_lead', JSON.stringify(lead));
    renderPage(lead);
    toast('🎉 Fiche enrichie — score recalculé');
  };
}

// ── COLD CALL ─────────────────────────────────────────────────────────────────
let callSteps = [], currentStep = 0;

async function generateCall() {
  const l = lead;
  const zone = document.getElementById('call-zone');
  const btn = document.getElementById('btn-gen-call');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin" style="width:11px;height:11px;border-width:1.5px"></div>';
  zone.innerHTML = '<div class="ai-loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>Script en cours…</div>';

  const ws = l.websiteEnriched || l.website;
  const ph = l.phoneEnriched || l.phone;
  const lacunes = [!ws && 'pas de site web', (!l.instagram&&!l.facebook) && 'absent des réseaux sociaux'].filter(Boolean).join(' et ');

  const prompt = `Tu es un expert cold call B2B pour agences digitales françaises.
Crée un script d'appel complet pour prospecter :
Entreprise : ${l.name} (${l.nafLabel||'commerce local'})
Lacunes : ${lacunes||'présence digitale partielle'}
${l.googleRating ? 'Note Google : '+l.googleRating+'/5' : ''}

Retourne UNIQUEMENT un JSON valide (sans markdown, sans backticks) avec ce format exact :
{"steps":[{"title":"Accroche","duration":"0-15s","script":"...","tip":"...","branches":[{"trigger":"...","response":"..."}]},{"title":"Qualification","duration":"15-45s","script":"...","tip":"...","branches":[]},{"title":"Pitch","duration":"45s-2min","script":"...","tip":"...","branches":[{"trigger":"...","response":"..."}]},{"title":"Closing","duration":"2-3min","script":"...","tip":"...","branches":[{"trigger":"...","response":"..."}]}]}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message||'Erreur API');
    let raw = (data.content||[]).map(b=>b.text||'').join('').trim();
    raw = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(raw);
    callSteps = parsed.steps || [];
    currentStep = 0;
    renderCallScript();
  } catch(e) {
    zone.innerHTML = `<div style="color:var(--o);font-size:12px;padding:12px">Erreur: ${esc(e.message)}</div>`;
  }
  btn.disabled = false;
  btn.innerHTML = '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>Générer';
}

function renderCallScript() {
  const ph = lead.phoneEnriched || lead.phone;
  let html = '';
  if (ph) html += `<div class="call-ready"><div class="cr-icon">📞</div><div><div class="cr-title">Prêt à appeler</div><div class="cr-sub">Numéro : <strong style="color:#fff">${esc(ph)}</strong> · Lance le script et c'est parti</div></div></div>`;
  html += `<div class="prog-bar">
    ${callSteps.map((_,i)=>`<div class="prog-seg ${i===0?'active':''}" id="prog-${i}"></div>`).join('')}
    <div class="prog-lbl" id="prog-label">Étape 1/${callSteps.length}</div>
  </div>`;
  html += callSteps.map((s,i) => `
    <div class="step-card ${i===0?'active':''}" id="step-${i}">
      <div class="step-head" onclick="toggleStep(${i})">
        <div class="step-num ${i===0?'actv':'pend'}" id="stepnum-${i}">${i+1}</div>
        <div class="step-title">${esc(s.title)}</div>
        <div class="step-dur">${esc(s.duration||'')}</div>
      </div>
      <div class="step-body ${i===0?'open':''}" id="stepbody-${i}">
        <div class="step-script">"${esc(s.script)}"</div>
        ${s.tip ? `<div class="step-tip">💡 ${esc(s.tip)}</div>` : ''}
        ${s.branches && s.branches.length ? `<div class="branches">
          <div class="branch-lbl">Objections / Réponses</div>
          ${s.branches.map((b,bi) => `
            <div class="branch-item">
              <div class="branch-trigger" id="bt-${i}-${bi}" onclick="toggleBranch(${i},${bi})">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
                ${esc(b.trigger)}
              </div>
              <div class="branch-resp" id="br-${i}-${bi}">"${esc(b.response)}"</div>
            </div>`).join('')}
        </div>` : ''}
        <div class="step-nav">
          <button class="btn-done" onclick="markDone(${i})">✓ Étape suivante</button>
          <button class="btn-skip" onclick="markDone(${i})">Passer</button>
        </div>
      </div>
    </div>`).join('');
  html += `<div style="margin-top:10px;display:flex;gap:8px"><button class="btn-ai btn-ghost" onclick="copyFullScript()" style="font-size:11px">📋 Copier script complet</button></div>`;
  document.getElementById('call-zone').innerHTML = html;
  goStep(0);
}

function toggleStep(i) {
  const b = document.getElementById('stepbody-'+i);
  b.classList.toggle('open');
}
function toggleBranch(i,bi) {
  const r = document.getElementById('br-'+i+'-'+bi);
  const t = document.getElementById('bt-'+i+'-'+bi);
  r.classList.toggle('open');
  t.classList.toggle('open');
}
function markDone(i) {
  const s = document.getElementById('step-'+i);
  const n = document.getElementById('stepnum-'+i);
  const b = document.getElementById('stepbody-'+i);
  s.classList.remove('active'); s.classList.add('done');
  n.className = 'step-num dn'; n.textContent = '✓';
  b.classList.remove('open');
  document.getElementById('prog-'+i).className = 'prog-seg done';
  const nx = i+1;
  if (nx < callSteps.length) goStep(nx);
  else { document.getElementById('prog-label').textContent = '✓ Appel terminé !'; toast('🎉 Script terminé — bonne prospection !'); }
}
function goStep(i) {
  currentStep = i;
  for (let j=0; j<callSteps.length; j++) {
    const p = document.getElementById('prog-'+j);
    if (!p) continue;
    if (j < i) p.className = 'prog-seg done';
    else if (j === i) p.className = 'prog-seg active';
    else if (!p.classList.contains('done')) p.className = 'prog-seg';
  }
  document.getElementById('prog-label').textContent = `Étape ${i+1}/${callSteps.length}`;
  const s = document.getElementById('step-'+i);
  const n = document.getElementById('stepnum-'+i);
  const b = document.getElementById('stepbody-'+i);
  if (s && !s.classList.contains('done')) {
    s.classList.add('active'); n.className = 'step-num actv'; b.classList.add('open');
    s.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}
function copyFullScript() {
  const t = callSteps.map((s,i)=>`[${i+1}] ${s.title} (${s.duration||''})\n"${s.script}"\n${(s.branches||[]).map(b=>`→ ${b.trigger}\n"${b.response}"`).join('\n')}`).join('\n\n──\n\n');
  copyText(t,'Script complet');
}

// ── CURSOR ────────────────────────────────────────────────────────────────────
function initCursor() {
  const c = document.getElementById('cur');
  if (!c) return;
  document.addEventListener('mousemove', e => { c.style.left=(e.clientX-4)+'px'; c.style.top=(e.clientY-4)+'px'; });
  document.addEventListener('mousedown', () => c.classList.add('c'));
  document.addEventListener('mouseup', () => c.classList.remove('c'));
  const addH = el => {
    el.addEventListener('mouseenter', () => c.classList.add('h'));
    el.addEventListener('mouseleave', () => c.classList.remove('h'));
  };
  document.querySelectorAll('a,button,input').forEach(addH);
  new MutationObserver(ms => ms.forEach(m => m.addedNodes.forEach(n => {
    if (n.nodeType === 1) { n.querySelectorAll && n.querySelectorAll('a,button,input').forEach(addH); if (n.matches && n.matches('a,button,input')) addH(n); }
  }))).observe(document.body, {childList:true,subtree:true});
}

renderPage(lead);
initCursor();
